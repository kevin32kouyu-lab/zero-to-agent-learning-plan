<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>零基础到Agent开发两个月计划</title>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar-folder.min.css">
  <style>
    /* 强制深色主题 */
    body {
      background-color: #282c34;
      color: #dcdcdc;
    }
    .markdown-section a {
      color: #61afef;
    }
    .markdown-section p {
      color: #dcdcdc;
    }
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4 {
      color: #dcdcdc;
    }
    .sidebar {
      background-color: #282c34;
    }
    .sidebar ul li a {
      color: #dcdcdc;
    }
    .codepanel {
      background-color: #1e2127;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '零基础到Agent开发两个月计划',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      mergeNavbar: true,
      // 启用HTML渲染，支持details折叠
      render: {
        html: true
      },
      sidebarCollapse: {
        enable: true,
        ignore: [0]
      },
      search: {
        noData: '找不到结果',
        placeholder: '搜索'
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/search/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar-folder.min.js"></script>
</body>
</html>
